# =============================================================================
# Deploy this repo's docs site (website/) to its OWN Vercel project.
# Drop into a source repo at .github/workflows/vercel-deploy.yml.
#
# Docs live on a dedicated `docs` branch (kept separate from `main` code) and
# deploy from there — pushing docs work to `docs` triggers a production deploy.
#
# IMPORTANT: this repo ALSO deploys an app to Vercel from `main` (VERCEL_PROJECT_ID).
# Docs use a SEPARATE Vercel project + a SEPARATE secret (VERCEL_DOC_PROJECT_ID) so a
# docs deploy never clobbers the app's production.
#
# One-time setup (Vercel) for the DOCS project:
#   1. Create a NEW, separate Vercel project linked to this repo (not the app's).
#   2. (If it uses Vercel's Git integration) set its Production Branch = `docs`.
#      Root Directory can stay at the repo root — the root vercel.json builds website/.
#   3. Add the repo Actions secret VERCEL_DOC_PROJECT_ID = that docs project's id.
#      (VERCEL_TOKEN + VERCEL_ORG_ID are shared with the app project.)
#
# Vercel builds Docusaurus remotely. Until VERCEL_DOC_PROJECT_ID exists, this deploy
# fails harmlessly without touching the app project.
# =============================================================================
name: Deploy docs to Vercel

on:
  push:
    branches: [docs]
  workflow_dispatch:

# Only one production deploy at a time; a newer deploy cancels an in-flight one so
# the latest commit always wins the production alias (prevents a slow older deploy
# from re-aliasing production to a stale build).
concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        run: vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          # Separate from the app's VERCEL_PROJECT_ID — docs deploy to their own project.
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOC_PROJECT_ID }}
